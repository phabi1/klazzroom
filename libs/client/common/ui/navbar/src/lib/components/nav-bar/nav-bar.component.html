<ng-container *ngFor="let link of links">
  <klazzroom-client-common-ui-navbar-nav-item
    *ngIf="link.type === 'item'"
    [item]="link"
  ></klazzroom-client-common-ui-navbar-nav-item>
  <klazzroom-client-common-ui-navbar-nav-group
    *ngIf="link.type === 'group'"
    [item]="link"
  ></klazzroom-client-common-ui-navbar-nav-group>
  <klazzroom-client-common-ui-navbar-nav-folder
    *ngIf="link.type === 'folder'"
    [item]="link"
  ></klazzroom-client-common-ui-navbar-nav-folder>
</ng-container>
