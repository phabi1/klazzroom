<div class="p-4">
  <div class="flex mb-4 justify-between items-center">
    <h1 class="text-2xl font-bold" i18n="@@skills.domains.title">Domains</h1>
    <div>
      <div>
        <a mat-raised-button color="primary" routerLink="./create">Create</a>
      </div>
    </div>
  </div>

  <div class="shadow">
    <table mat-table [dataSource]="items">
      <!-- Symbol Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef class="w-full">Title</th>
        <td mat-cell *matCellDef="let element">
          <a [routerLink]="['./', element.id, 'items']">{{ element.title }}</a>
        </td></ng-container
      >

      <ng-container matColumnDef="color">
        <th mat-header-cell *matHeaderCellDef>Color</th>
        <td mat-cell *matCellDef="let element">
          <lib-badge [color]="element.color"></lib-badge>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let element">
          <div class="flex">
            <a mat-icon-button [routerLink]="['.', element.id, 'edit']"
              ><mat-icon>edit</mat-icon></a
            >
            <a mat-icon-button [routerLink]="['.', element.id, 'delete']"
              ><mat-icon>delete</mat-icon></a
            >
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
  <router-outlet></router-outlet>
</div>
