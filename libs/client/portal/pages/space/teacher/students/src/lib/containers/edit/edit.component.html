<div class="p-4">
    <div class="mb-4 flex justify-between">
      <div class="text-2xl">Edit Student</div>
      <div>
        <button
          mat-raised-button
          color="primary"
          [disabled]="form.invalid"
          (click)="submit()"
        >
          Save
        </button>
      </div>
    </div>
    <formly-form [form]="form" [fields]="fields" [model]="model"> </formly-form>
  </div>
