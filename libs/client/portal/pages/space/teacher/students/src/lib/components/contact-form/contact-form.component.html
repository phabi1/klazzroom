<h1 *ngIf="mode === 'add'" mat-dialog-title>Create contact</h1>
<h1 *ngIf="mode === 'update'" mat-dialog-title>Update contact</h1>
<mat-dialog-content>
  <formly-form [form]="form" [model]="model" [fields]="fields"></formly-form>
</mat-dialog-content>
<div mat-dialog-actions>
  <button mat-button mat-dialog-close="">Cancel</button>
  <button
    *ngIf="mode === 'add'"
    mat-button
    color="primary"
    (click)="submit()"
    cdkFocusInitial
  >
    Create
  </button>
  <button
    *ngIf="mode === 'update'"
    mat-button
    color="primary"
    (click)="submit()"
    cdkFocusInitial
  >
    Save
  </button>
</div>
