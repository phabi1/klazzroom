<div class="flex p-4 flex-col">
  <div class="text-xl text-center" i18n="@@dashboard.widgets.birthdays.title">
    Birthdays
  </div>
  <div class="flex-1 justify-center items-center">
    <div *ngIf="(empty$ | async) === false; else emptyTpl">
      <div *ngFor="let student of students$ | async">
        <div>{{ student.firstname }}</div>
        <div class="text-xs">{{ student.birthday | date }}</div>
      </div>
    </div>
  </div>
</div>
<ng-template #emptyTpl>
  <div class="text-center" i18n="@@dashboard.widgets.birthdays.messages.empty">
    No birthdays
  </div>
</ng-template>
