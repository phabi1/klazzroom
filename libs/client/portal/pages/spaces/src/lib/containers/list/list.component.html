<div class="p-4">
  <div class="text-2xl font-bold mb-4">
    <h1>My Spaces</h1>
  </div>
  <div class="grid grid-cols-3 gap-4">
    <div
      *ngFor="let space of spaces$ | async"
      class="bg-white border rounded-sm p-4"
    >
      <div class="text-center text-sm">Teacher</div>
      <div class="font-bold text-center mb-4">
        {{ space.title }}
      </div>
      <a
        mat-raised-button
        color="primary"
        class="w-full"
        [routerLink]="['/space', space.id]"
      >
        Go to space
      </a>
    </div>
  </div>
</div>
